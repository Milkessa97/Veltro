services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend/devpulse
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/devpulse:/app
      - /app/node_modules
    ports:
      - "3000:3000"
