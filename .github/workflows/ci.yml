name: CI

on:
  pull_request:
    branches: 
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: "pip"
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Lint with ruff
      working-directory: backend
      run: ruff check app

    - name: Run tests
      working-directory: backend
      env:
        # Dummy values that satisfy Settings validation — no real secrets used
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: devpulse_test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/devpulse_test
        GITHUB_CLIENT_ID: dummy_client_id
        GITHUB_CLIENT_SECRET: dummy_client_secret
        GITHUB_WEBHOOK_SECRET: dummy_webhook_secret
        GITHUB_APP_ID: "1"
        GITHUB_PRIVATE_KEY: dummy_private_key
        CLAUDE_API_KEY: dummy_claude_key
        SECRET_KEY: a-very-long-secret-key-used-only-for-ci-testing
        ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
        JWT_ALGORITHM: HS256
        ENVIRONMENT: test
        FRONTEND_URL: http://localhost:3000
        ACCESS_TOKEN_EXPIRE_MINUTES: "30"
        REFRESH_TOKEN_EXPIRE_DAYS: "7"
      run: python -m pytest app/tests